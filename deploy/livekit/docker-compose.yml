# ─────────────────────────────────────────────────────────────────────────────
# Self-hosted LiveKit stack for T-800 (Mumbai VPS, Coolify)
#
# Three services, all on HOST networking (required — WebRTC/SIP use wide UDP
# ranges that can't be port-mapped sanely):
#   • redis    — coordination + SIP session state (localhost only, not exposed)
#   • livekit  — the SFU (WebRTC). Peers (SIP svc + the agent) are all on THIS box,
#                so WebRTC media stays local → use_external_ip:false avoids hairpin NAT.
#   • sip      — Vobiz ↔ LiveKit bridge. The ONLY service that faces the internet
#                (SIP 5060 + RTP 10000-20000) → use_external_ip:true.
#
# Secrets are NOT in this file. Set these as environment variables in Coolify and
# they are substituted into the config bodies below:
#   LIVEKIT_API_KEY     e.g. APIxxxxxxxx   (any string; generate a fresh pair)
#   LIVEKIT_API_SECRET  long random secret
# Use the SAME pair in your app container (LIVEKIT_API_KEY / LIVEKIT_API_SECRET).
#
# Pin image tags to a specific release for production (see README); :latest is a
# convenience for the first deploy.
# ─────────────────────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    network_mode: host
    # Bind to loopback only — never expose Redis on a public VPS.
    command: ["redis-server", "--bind", "127.0.0.1", "--save", "60", "1"]
    volumes:
      - redis_data:/data

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    network_mode: host
    depends_on:
      - redis
    # Full server config supplied inline; ${...} is filled by Coolify env at deploy.
    environment:
      LIVEKIT_CONFIG_BODY: |
        port: 7880
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: false
        redis:
          address: 127.0.0.1:6379
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        logging:
          level: info

  sip:
    image: livekit/sip:latest
    restart: unless-stopped
    network_mode: host
    depends_on:
      - redis
      - livekit
    environment:
      SIP_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://127.0.0.1:7880
        redis:
          address: 127.0.0.1:6379
        sip_port: 5060
        rtp_port: 10000-20000
        use_external_ip: true
        logging:
          level: info

volumes:
  redis_data:
